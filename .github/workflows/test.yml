name: test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.6.1
          args: --timeout=5m

  static-css-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Tailwind build matches committed app.css
        run: |
          npm ci
          npm run build:css
          git diff --exit-code static/css/app.css

  compose-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: compose security policy
        run: ./scripts/check_compose_security.sh

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.2.0 ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec
        run: $(go env GOPATH)/bin/gosec ./...

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go test (race + coverage)
        run: go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic
      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -n 1
      - name: coverage minimum
        run: ./scripts/check_coverage.sh coverage.out
        env:
          MIN_COVERAGE_PERCENT: "20"
      - name: upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false
      - name: upload coverage.out
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-out
          path: coverage.out
          if-no-files-found: ignore

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nms-user
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: NMS
        options: >-
          --health-cmd "pg_isready -U nms-user -d NMS"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_DSN: host=postgres port=5432 user=nms-user password=testpass dbname=NMS sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: migrations
        run: go run ./cmd/migration
      - name: integration tests
        run: go test ./internal/infrastructure/postgres/ ./internal/repository/ ./internal/delivery/http/ -count=1 -race -v -run Integration
