name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go test
        run: go test ./... -count=1

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nms-user
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: NMS
        options: >-
          --health-cmd "pg_isready -U nms-user -d NMS"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_DSN: host=postgres port=5432 user=nms-user password=testpass dbname=NMS sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: migrations
        run: go run ./cmd/migration
      - name: integration tests
        run: go test ./internal/infrastructure/postgres/ ./internal/repository/ ./internal/delivery/http/ -count=1 -v -run Integration
