name: test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.6.1
          args: --timeout=5m

  static-css-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Tailwind build matches committed app.css
        run: |
          npm ci
          npm run build:css
          git diff --exit-code static/css/app.css

  compose-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: compose security policy
        run: ./scripts/check_compose_security.sh

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.2.0 ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec
        run: $(go env GOPATH)/bin/gosec ./...

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  sbom-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: generate SBOM (SPDX JSON)
        run: ./scripts/generate_sbom.sh sbom.spdx.json
      - name: sign SBOM with keyless cosign
        if: github.event_name != 'pull_request'
        env:
          COSIGN_IMAGE: gcr.io/projectsigstore/cosign:v2.4.1
        run: |
          docker run --rm \
            -e COSIGN_EXPERIMENTAL=1 \
            -e ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            -e ACTIONS_ID_TOKEN_REQUEST_URL \
            -v "$PWD:/work" \
            -w /work \
            "$COSIGN_IMAGE" \
            sign-blob --yes \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.pem \
            sbom.spdx.json
      - name: verify signed SBOM
        if: github.event_name != 'pull_request'
        env:
          COSIGN_IMAGE: gcr.io/projectsigstore/cosign:v2.4.1
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            "$COSIGN_IMAGE" \
            verify-blob \
            --certificate sbom.spdx.json.pem \
            --signature sbom.spdx.json.sig \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp 'https://github.com/.+' \
            sbom.spdx.json
      - name: upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          if-no-files-found: error
      - name: upload SBOM signature artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: sbom-signature
          path: |
            sbom.spdx.json.sig
            sbom.spdx.json.pem
          if-no-files-found: error

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go test (race + coverage)
        run: go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic
      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -n 1
      - name: coverage minimum
        run: ./scripts/check_coverage.sh coverage.out
        env:
          MIN_COVERAGE_PERCENT: "25"
      - name: upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false
      - name: upload coverage.out
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-out
          path: coverage.out
          if-no-files-found: ignore

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nms-user
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: NMS
        options: >-
          --health-cmd "pg_isready -U nms-user -d NMS"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_DSN: host=postgres port=5432 user=nms-user password=testpass dbname=NMS sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: migrations
        run: go run ./cmd/migration
      - name: integration tests
        run: go test ./internal/infrastructure/postgres/ ./internal/repository/ ./internal/delivery/http/ -count=1 -race -v -run Integration

  e2e-http-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nms-user
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: NMS
        options: >-
          --health-cmd "pg_isready -U nms-user -d NMS"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_DSN: host=postgres port=5432 user=nms-user password=testpass dbname=NMS sslmode=disable
      NMS_ALLOW_NO_AUTH: "true"
      NMS_SESSION_SECRET: ci-e2e-session-secret
      BASE_URL: http://127.0.0.1:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: migrations
        run: go run ./cmd/migration
      - name: start api server
        run: |
          go run ./cmd/server > /tmp/nms-api.log 2>&1 &
          echo $! > /tmp/nms-api.pid
      - name: wait for api
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "$BASE_URL/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "api did not become ready in time" >&2
          exit 1
      - name: e2e smoke
        run: ./scripts/e2e_http_smoke.sh
      - name: upload api log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-http-smoke-api-log
          path: /tmp/nms-api.log
          if-no-files-found: ignore

  e2e-auth-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nms-user
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: NMS
        options: >-
          --health-cmd "pg_isready -U nms-user -d NMS"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_DSN: host=postgres port=5432 user=nms-user password=testpass dbname=NMS sslmode=disable
      NMS_ADMIN_USER: admin
      NMS_ADMIN_PASS: test-admin-pass
      NMS_VIEWER_USER: viewer
      NMS_VIEWER_PASS: test-viewer-pass
      NMS_SESSION_SECRET: ci-e2e-auth-session-secret
      BASE_URL: http://127.0.0.1:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: migrations
        run: go run ./cmd/migration
      - name: start api server
        run: |
          go run ./cmd/server > /tmp/nms-api-auth.log 2>&1 &
          echo $! > /tmp/nms-api-auth.pid
      - name: wait for api
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "$BASE_URL/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "api did not become ready in time" >&2
          exit 1
      - name: e2e auth smoke
        run: ./scripts/e2e_auth_smoke.sh
      - name: upload api log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-auth-smoke-api-log
          path: /tmp/nms-api-auth.log
          if-no-files-found: ignore

  contract-http-spec:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nms-user
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: NMS
        options: >-
          --health-cmd "pg_isready -U nms-user -d NMS"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_DSN: host=postgres port=5432 user=nms-user password=testpass dbname=NMS sslmode=disable
      NMS_ADMIN_USER: admin
      NMS_ADMIN_PASS: test-admin-pass
      NMS_VIEWER_USER: viewer
      NMS_VIEWER_PASS: test-viewer-pass
      NMS_SESSION_SECRET: ci-contract-session-secret
      BASE_URL: http://127.0.0.1:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: migrations
        run: go run ./cmd/migration
      - name: start api server
        run: |
          go run ./cmd/server > /tmp/nms-api-contract.log 2>&1 &
          echo $! > /tmp/nms-api-contract.pid
      - name: wait for api
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "$BASE_URL/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "api did not become ready in time" >&2
          exit 1
      - name: contract spec checks
        run: ./scripts/contract_http_spec.sh
      - name: upload api log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-http-spec-api-log
          path: /tmp/nms-api-contract.log
          if-no-files-found: ignore
