openapi: 3.0.3
info:
  title: NMS1 API
  description: |
    SNMP NMS: устройства, трапы, SNMP GET/SET, MIB. HTML-страницы не описаны здесь полностью.

    **Публично без авторизации:** `GET /health`, `GET /ready`, `GET /metrics`, `GET|POST /login`, `POST /alerts/webhook`, `POST /itsm/inbound`, `POST /itsm/inbound/dry-run` (token-required).

    Остальные пути — после входа (cookie-сессия или HTTP Basic с теми же учётными данными).

    Спецификация отдаётся как `GET /api/openapi.yaml` (нужна авторизация).
  version: "1.0.0"
servers:
  - url: /
    description: Текущий хост (замените на базовый URL стенда)

tags:
  - name: health
  - name: devices
  - name: traps
  - name: trap-mappings
  - name: itsm-mappings
  - name: automation
  - name: snmp
  - name: incidents

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness (процесс жив)
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /ready:
    get:
      tags: [health]
      summary: Readiness (БД доступна)
      responses:
        "200":
          description: Готов принимать трафик
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyOK"
        "503":
          description: БД недоступна
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyFail"

  /metrics:
    get:
      tags: [health]
      summary: Prometheus metrics
      responses:
        "200":
          description: text exposition format

  /itsm/inbound:
    post:
      tags: [incidents]
      summary: Inbound sync from external ITSM (token auth via Bearer/X-ITSM-Token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ITSMInboundIncidentUpdateRequest"
      responses:
        "200":
          description: Incident synchronized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ITSMInboundIncidentUpdateResponse"
        "400": {}
        "401": {}
        "404": {}
        "503": {}

  /itsm/inbound/dry-run:
    post:
      tags: [incidents]
      summary: Dry-run inbound mapping resolution without incident mutation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ITSMInboundIncidentUpdateRequest"
      responses:
        "200":
          description: Effective mapping resolution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ITSMInboundDryRunResponse"
        "400": {}
        "401": {}
        "503": {}

  /devices:
    get:
      tags: [devices]
      summary: Список устройств (JSON)
      security:
        - sessionOrBasic: []
      responses:
        "200":
          description: Массив устройств
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
    post:
      tags: [devices]
      summary: Создать устройство (admin)
      security:
        - sessionOrBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceCreate"
      responses:
        "200":
          description: Создано
        "400":
          description: Ошибка валидации
        "403":
          description: Не admin

  /devices/{id}:
    parameters:
      - $ref: "#/components/parameters/deviceId"
    delete:
      tags: [devices]
      summary: Удалить устройство (admin)
      security:
        - sessionOrBasic: []
      responses:
        "200":
          description: HTML-фрагмент таблицы (HTMX)
        "403": {}
        "404": {}
    post:
      tags: [devices]
      summary: Обновить устройство — форма (admin)
      security:
        - sessionOrBasic: []
      responses:
        "200":
          description: HTML строка таблицы

  /devices/{id}/metric/{oid}:
    parameters:
      - $ref: "#/components/parameters/deviceId"
      - name: oid
        in: path
        required: true
        schema:
          type: string
        description: Числовой OID или символьное имя (URL-encode)
    get:
      tags: [snmp]
      summary: SNMP GET одного OID
      security:
        - sessionOrBasic: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

  /devices/{id}/snmp/set:
    parameters:
      - $ref: "#/components/parameters/deviceId"
    post:
      tags: [snmp]
      summary: SNMP SET (admin)
      security:
        - sessionOrBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oid, type]
              properties:
                oid:
                  type: string
                type:
                  type: string
                  example: Integer
                value: {}
                validate_only:
                  type: boolean
      responses:
        "200": {}
        "400": {}
        "403": {}
        "404": {}

  /traps:
    get:
      tags: [traps]
      summary: Список трапов
      security:
        - sessionOrBasic: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: device_id
          in: query
          schema:
            type: integer
          description: Фильтр по id устройства в БД
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /trap-oid-mappings:
    get:
      tags: [trap-mappings]
      summary: Список trap OID mapping rules
      security:
        - sessionOrBasic: []
      parameters:
        - name: vendor
          in: query
          schema:
            type: string
        - name: enabled
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Список mapping-правил
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrapOIDMapping"
    post:
      tags: [trap-mappings]
      summary: Создать trap OID mapping rule (admin)
      security:
        - sessionOrBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrapOIDMappingUpsertRequest"
      responses:
        "200":
          description: Созданный mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrapOIDMapping"
        "400": {}
        "403": {}
    put:
      tags: [trap-mappings]
      summary: Обновить trap OID mapping rule по id (admin)
      security:
        - sessionOrBasic: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrapOIDMappingUpsertRequest"
      responses:
        "200":
          description: Обновленный mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrapOIDMapping"
        "400": {}
        "403": {}
        "404": {}

  /itsm-inbound-mappings:
    get:
      tags: [itsm-mappings]
      summary: List ITSM inbound mapping rules
      security:
        - sessionOrBasic: []
      parameters:
        - name: provider
          in: query
          schema:
            type: string
        - name: enabled
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Mapping rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ITSMInboundMapping"
    post:
      tags: [itsm-mappings]
      summary: Create ITSM inbound mapping rule (admin)
      security:
        - sessionOrBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ITSMInboundMappingUpsertRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ITSMInboundMapping"
        "400": {}
        "403": {}
    put:
      tags: [itsm-mappings]
      summary: Update ITSM inbound mapping rule by id (admin)
      security:
        - sessionOrBasic: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ITSMInboundMappingUpsertRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ITSMInboundMapping"
        "400": {}
        "403": {}
        "404": {}
    delete:
      tags: [itsm-mappings]
      summary: Delete ITSM inbound mapping rule by id (admin)
      security:
        - sessionOrBasic: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ITSMInboundMappingDeleteResponse"
        "400": {}
        "403": {}
        "404": {}

  /incidents:
    get:
      tags: [incidents]
      summary: Список инцидентов
      security:
        - sessionOrBasic: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
        - name: device_id
          in: query
          schema:
            type: integer
            minimum: 1
        - name: status
          in: query
          schema:
            type: string
            enum: [new, acknowledged, in_progress, resolved, closed]
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, warning, info]
        - name: cursor
          in: query
          schema:
            type: string
          description: Курсор следующей страницы (base64 token из next_cursor)
        - name: include_pagination
          in: query
          schema:
            type: boolean
          description: Если true, ответ в формате {items,next_cursor}
      responses:
        "200":
          description: Список инцидентов (array или paged object)
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: "#/components/schemas/Incident"
                  - $ref: "#/components/schemas/IncidentListPage"
    post:
      tags: [incidents]
      summary: Создать инцидент (admin)
      security:
        - sessionOrBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncidentCreate"
      responses:
        "200":
          description: Созданный инцидент
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "400": {}
        "403": {}

  /incidents/{incidentID}:
    parameters:
      - $ref: "#/components/parameters/incidentId"
    get:
      tags: [incidents]
      summary: Получить инцидент с историей переходов
      security:
        - sessionOrBasic: []
      responses:
        "200":
          description: Incident + transitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentWithTransitions"
        "404": {}

  /incidents/{incidentID}/status:
    parameters:
      - $ref: "#/components/parameters/incidentId"
    post:
      tags: [incidents]
      summary: Сменить статус инцидента (admin)
      security:
        - sessionOrBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncidentTransitionRequest"
      responses:
        "200":
          description: Обновлённый инцидент
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "400": {}
        "403": {}
        "404": {}

  /incidents/{incidentID}/assignee:
    parameters:
      - $ref: "#/components/parameters/incidentId"
    post:
      tags: [incidents]
      summary: Назначить/снять assignee инцидента (admin)
      security:
        - sessionOrBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncidentAssignRequest"
      responses:
        "200":
          description: Обновлённый инцидент
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "400": {}
        "403": {}
        "404": {}

  /incidents/bulk/status:
    post:
      tags: [incidents]
      summary: Массовая смена статуса инцидентов (admin)
      security:
        - sessionOrBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncidentBulkTransitionRequest"
      responses:
        "200":
          description: Результат массового обновления
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentBulkTransitionResponse"
        "400": {}
        "403": {}

  /settings/incident-automation-snapshot:
    get:
      tags: [automation]
      summary: Runtime snapshot of active escalation policies and ITSM inbound mapping rules
      security:
        - sessionOrBasic: []
      responses:
        "200":
          description: Snapshot payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentAutomationSnapshotResponse"
        "500": {}

  /api/openapi.yaml:
    get:
      tags: [health]
      summary: Эта спецификация (YAML)
      security:
        - sessionOrBasic: []
      responses:
        "200":
          content:
            application/yaml:
              schema:
                type: string

components:
  securitySchemes:
    sessionOrBasic:
      type: http
      scheme: basic
      description: Cookie-сессия после POST /login или тот же логин/пароль через Basic.

  parameters:
    deviceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Числовой id устройства в БД
    incidentId:
      name: incidentID
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Числовой id инцидента

  schemas:
    ReadyOK:
      type: object
      properties:
        status:
          type: string
          example: ready
        checks:
          type: object
          additionalProperties:
            type: string
    ReadyFail:
      type: object
      properties:
        status:
          type: string
          example: not_ready
        checks:
          type: object
    Device:
      type: object
      properties:
        id:
          type: integer
        ip:
          type: string
        name:
          type: string
        snmp_version:
          type: string
        status:
          type: string
    DeviceCreate:
      type: object
      required: [ip, name]
      properties:
        ip:
          type: string
        name:
          type: string
        community:
          type: string
        snmp_version:
          type: string
    Incident:
      type: object
      properties:
        id:
          type: integer
          format: int64
        device_id:
          type: integer
          nullable: true
        assignee:
          type: string
          nullable: true
        title:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        status:
          type: string
          enum: [new, acknowledged, in_progress, resolved, closed]
        source:
          type: string
          enum: [polling, trap, manual]
        details:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
    IncidentCreate:
      type: object
      required: [title]
      properties:
        device_id:
          type: integer
          minimum: 1
        assignee:
          type: string
          nullable: true
        title:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
          default: warning
        source:
          type: string
          enum: [polling, trap, manual]
          default: manual
        details:
          type: object
          additionalProperties: true
    IncidentTransition:
      type: object
      properties:
        id:
          type: integer
          format: int64
        incident_id:
          type: integer
          format: int64
        from_status:
          type: string
        to_status:
          type: string
        changed_by:
          type: string
        comment:
          type: string
        changed_at:
          type: string
          format: date-time
    IncidentWithTransitions:
      type: object
      properties:
        incident:
          $ref: "#/components/schemas/Incident"
        transitions:
          type: array
          items:
            $ref: "#/components/schemas/IncidentTransition"
    IncidentTransitionRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, acknowledged, in_progress, resolved, closed]
        comment:
          type: string
    IncidentAssignRequest:
      type: object
      properties:
        assignee:
          type: string
          nullable: true
          description: Пустая строка очищает assignee.
        comment:
          type: string
    IncidentBulkTransitionRequest:
      type: object
      required: [incident_ids, status]
      properties:
        incident_ids:
          type: array
          items:
            type: integer
            format: int64
          minItems: 1
        status:
          type: string
          enum: [new, acknowledged, in_progress, resolved, closed]
        comment:
          type: string
    IncidentBulkTransitionResponse:
      type: object
      properties:
        requested_count:
          type: integer
        updated_count:
          type: integer
        failed_count:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/Incident"
        results:
          type: array
          items:
            $ref: "#/components/schemas/IncidentBulkTransitionResult"
    IncidentBulkTransitionResult:
      type: object
      properties:
        incident_id:
          type: integer
          format: int64
        success:
          type: boolean
        error:
          type: string
        incident:
          $ref: "#/components/schemas/Incident"
    IncidentListPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Incident"
        next_cursor:
          type: string
          nullable: true
    TrapOIDMapping:
      type: object
      properties:
        id:
          type: integer
          format: int64
        vendor:
          type: string
        oid_pattern:
          type: string
        signal_kind:
          type: string
          enum: [generic, link_down, link_up, bfd_down, bfd_up]
        title:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        is_recovery:
          type: boolean
        priority:
          type: integer
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
    TrapOIDMappingUpsertRequest:
      type: object
      required: [oid_pattern, signal_kind, title, severity]
      properties:
        vendor:
          type: string
          default: generic
        oid_pattern:
          type: string
        signal_kind:
          type: string
          enum: [generic, link_down, link_up, bfd_down, bfd_up]
        title:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        is_recovery:
          type: boolean
        priority:
          type: integer
          default: 100
        enabled:
          type: boolean
          default: true
    TrapOIDMappingDeleteResponse:
      type: object
      properties:
        deleted:
          type: boolean
        mapping_id:
          type: integer
          format: int64
    ITSMInboundIncidentUpdateRequest:
      type: object
      required: [incident_id]
      properties:
        incident_id:
          type: integer
          format: int64
          minimum: 1
        provider:
          type: string
          description: External ITSM provider identifier for mapping lookup.
        status:
          type: string
          description: "Optional external status (supports aliases: open/ack/in-progress/resolve/close)."
        priority:
          type: string
          description: Optional external priority used by mapping rules.
        owner:
          type: string
          description: Optional external owner/team used by mapping rules.
        assignee:
          type: string
          nullable: true
          description: Optional owner; empty clears assignee when incident is assigned.
        comment:
          type: string
        changed_by:
          type: string
    ITSMInboundMapping:
      type: object
      properties:
        id:
          type: integer
          format: int64
        provider:
          type: string
        external_status:
          type: string
        external_priority:
          type: string
        external_owner:
          type: string
        mapped_status:
          type: string
          enum: ["", new, acknowledged, in_progress, resolved, closed]
        mapped_assignee:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer
        created_at:
          type: string
          format: date-time
    ITSMInboundMappingUpsertRequest:
      type: object
      properties:
        provider:
          type: string
          default: generic
        external_status:
          type: string
        external_priority:
          type: string
        external_owner:
          type: string
        mapped_status:
          type: string
          enum: ["", new, acknowledged, in_progress, resolved, closed]
        mapped_assignee:
          type: string
        enabled:
          type: boolean
          default: true
        priority:
          type: integer
          default: 100
      description: At least one of mapped_status or mapped_assignee is required.
    ITSMInboundMappingDeleteResponse:
      type: object
      properties:
        deleted:
          type: boolean
        mapping_id:
          type: integer
          format: int64
    ITSMInboundIncidentUpdateResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        applied_mapping_id:
          type: integer
          format: int64
          description: ID of matched ITSM mapping rule, 0 when no rule matched.
        incident:
          $ref: "#/components/schemas/Incident"
    ITSMInboundDryRunResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        dry_run:
          type: boolean
          example: true
        provider:
          type: string
        incident_id:
          type: integer
          format: int64
        effective_status:
          type: string
          nullable: true
        effective_assignee:
          type: string
          nullable: true
        applied_mapping_id:
          type: integer
          format: int64
    EscalationPolicyRuntime:
      type: object
      properties:
        name:
          type: string
        older_than:
          type: string
        target_assignee:
          type: string
        severity:
          type: string
        source:
          type: string
        only_if_unassigned:
          type: boolean
        active:
          type: boolean
    IncidentAutomationCounts:
      type: object
      properties:
        active_escalation_policies:
          type: integer
        active_itsm_mapping_rules:
          type: integer
    IncidentAutomationSnapshotResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        escalation:
          type: object
          properties:
            check_interval_sec:
              type: integer
            policies:
              type: array
              items:
                $ref: "#/components/schemas/EscalationPolicyRuntime"
            warnings:
              type: array
              items:
                type: string
        itsm_inbound_mappings:
          type: array
          items:
            $ref: "#/components/schemas/ITSMInboundMapping"
        counts:
          $ref: "#/components/schemas/IncidentAutomationCounts"
