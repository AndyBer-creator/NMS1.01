global:
  scrape_interval: 15s
rule_files:
  - /etc/prometheus/alerts/nms-alerts.yml
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['host.docker.internal:9093']
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  # Основной docker-compose.yml: api и worker в network_mode: host — метрики на портах хоста.
  - job_name: 'nms-api'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: /metrics
  - job_name: 'nms-worker'
    static_configs:
      - targets: ['host.docker.internal:8081']
    metrics_path: /metrics
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: /metrics
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
