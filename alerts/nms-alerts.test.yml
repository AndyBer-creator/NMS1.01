rule_files:
  - nms-alerts.yml

evaluation_interval: 1m

tests:
  - name: deadman-alert-fires
    interval: 1m
    input_series: []
    alert_rule_test:
      - alertname: NMSDeadManSwitch
        eval_time: 1m
        exp_alerts:
          - exp_labels:
              severity: info
            exp_annotations:
              summary: "NMS deadman switch"
              description: "Always-firing heartbeat alert to validate Alertmanager notification pipeline."

  - name: api-down-alert-fires
    interval: 1m
    input_series:
      - series: up{job="nms-api"}
        values: 0+0x5
    alert_rule_test:
      - alertname: NMSApiDown
        eval_time: 3m
        exp_alerts:
          - exp_labels:
              severity: critical
              job: nms-api
            exp_annotations:
              summary: "NMS API is down"
              description: "Prometheus cannot scrape nms-api for more than 2 minutes."

  - name: polling-failure-ratio-alert-fires
    interval: 1m
    input_series:
      - series: nms_worker_poll_devices_total{status="failed"}
        values: 0+30x40
      - series: nms_worker_poll_devices_total{status="active"}
        values: 0+10x40
    alert_rule_test:
      - alertname: NMSPollingFailureRatioHigh
        eval_time: 25m
        exp_alerts:
          - exp_labels:
              severity: warning
            exp_annotations:
              summary: "High worker polling failure ratio"
              description: "More than 30% of worker polling results are failed during the last 15 minutes."

  - name: polling-cycle-slow-alert-fires
    interval: 1m
    input_series:
      - series: nms_worker_poll_duration_seconds_sum
        values: 0+400x40
      - series: nms_worker_poll_duration_seconds_count
        values: 0+1x40
    alert_rule_test:
      - alertname: NMSPollingCycleSlow
        eval_time: 25m
        exp_alerts:
          - exp_labels:
              severity: warning
            exp_annotations:
              summary: "Worker polling cycle is slow"
              description: "Average worker polling cycle duration exceeds 180 seconds for 10 minutes."

  - name: host-cpu-saturation-alert-fires
    interval: 1m
    input_series:
      - series: node_cpu_seconds_total{job="node",instance="host1",mode="idle"}
        values: 0+0.05x40
    alert_rule_test:
      - alertname: NMSHostCPUHigh
        eval_time: 20m
        exp_alerts:
          - exp_labels:
              severity: warning
              instance: host1
            exp_annotations:
              summary: "Host CPU saturation"
              description: "Host CPU usage is above 85% for 10 minutes."

  - name: postgres-connections-saturation-alert-fires
    interval: 1m
    input_series:
      - series: up{job="postgres-exporter",instance="db1"}
        values: 1+0x40
      - series: pg_stat_activity_count{datname="NMS"}
        values: 0+85x40
      - series: pg_settings_max_connections
        values: 100+0x40
    alert_rule_test:
      - alertname: NMSPostgresConnectionsHigh
        eval_time: 20m
        exp_alerts:
          - exp_labels:
              severity: warning
            exp_annotations:
              summary: "PostgreSQL connection saturation"
              description: "PostgreSQL active connections exceed 80% of max_connections for 10 minutes."
