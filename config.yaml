# Секреты (DB_DSN, TELEGRAM_TOKEN и т.д.) задаются через переменные окружения (.env)
# См. .env.example

http:
  addr: ":8080"

snmp:
  port: 161
  timeout: 3
  retries: 1

# Каталог загрузки MIB через веб (можно переопределить MIB_UPLOAD_DIR).
paths:
  mib_upload_dir: "./mibs/uploads"
  mib_search_dirs: []
