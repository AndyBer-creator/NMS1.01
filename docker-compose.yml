# По умолчанию api и worker в network_mode: host — весь стек в Docker, SNMP/UDP до LAN как с хоста
# (Linux, Docker в WSL2). DB_DSN в .env: host=127.0.0.1 (postgres публикует 5432 на хост).
# Docker Desktop для Windows часто не поддерживает host-сеть: тогда docker compose -f docker-compose.bridge.yml up -d
# и DB_DSN с host=postgres; см. README.
services:
  traefik:
    image: traefik:v3.0
    container_name: nms1-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.caServer=https://acme-staging-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.le.acme.email=constrictor74@symanitron.ru"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - nms-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_DB: NMS
      POSTGRES_USER: nms-user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - nms-network
    restart: unless-stopped

  migration:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command:
    - /bin/sh
    - -c
    - |
      echo "⏳ Installing postgresql-client..."
      apk add --no-cache postgresql-client
      echo "⏳ Waiting for postgres..."
      until pg_isready -h postgres -p 5432 -U nms-user -d NMS; do
        echo "⏳ Postgres not ready - waiting..."
        sleep 2
      done
      echo "✅ Postgres READY! Running migration..."
      cd /app
      go run cmd/migration/main.go
      echo "🎉 Migration COMPLETED!"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      TZ: ${TZ:-UTC}
      DB_DSN: "${DB_DSN}"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: NMS
      POSTGRES_USER: nms-user
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nms-network

  api:
    build: .
    container_name: nms1-api-1
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}
      DB_DSN: "host=127.0.0.1 port=5432 user=nms-user password=${POSTGRES_PASSWORD} dbname=NMS sslmode=disable"
      TELEGRAM_TOKEN: "${TELEGRAM_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
    volumes:
      - ./logs:/app/logs:delegated
      - ./config.yaml:/app/config.yaml
      - ./mibs:/app/mibs
    command: ["./nms-api"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: nms-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prom.rule=Host(`prom.nms.test.com`)"
      - "traefik.http.routers.prom.entrypoints=websecure"
      - "traefik.http.routers.prom.tls=true"
      - "traefik.http.routers.prom.tls.certresolver=le"
      - "traefik.http.services.prom.loadbalancer.server.port=9090"
    networks:
      - nms-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: nms-grafana
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_USER=$${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.nms.test.com`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - nms-network
    restart: unless-stopped

  
  worker:
    build: .
    container_name: nms1-worker-1
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}
      DB_DSN: "host=127.0.0.1 port=5432 user=nms-user password=${POSTGRES_PASSWORD} dbname=NMS sslmode=disable"
    volumes:
      - ./logs:/app/logs:delegated
      - ./config.yaml:/app/config.yaml
      - ./mibs:/app/mibs:ro
    command: ["./nms-worker"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    restart: unless-stopped

  trap-receiver:
    build: 
      context: .
      dockerfile: cmd/trap-receiver/Dockerfile
    container_name: nms1-trap-receiver
    ports:
      - "162:162/udp"
    privileged: true
    environment:
      TZ: ${TZ:-UTC}
      NMS_ENV: docker
      DB_DSN: "${DB_DSN}"
      TELEGRAM_TOKEN: "${TELEGRAM_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
    volumes:
      - ./logs:/app/logs:delegated
      - ./config/critical_oids.json:/app/critical_oids.json
      - ./mibs:/app/mibs:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nms-network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  nms-network:
    driver: bridge
