# Default profiles for SNMP operations.
# This file is intended for future backend/UI wiring (operations -> OIDs).

operations:
  port_up:
    label: "Port UP (ifAdminStatus)"
    oid_template: "1.3.6.1.2.1.2.2.1.7.{ifIndex}"
    type: "Integer"
    value: 1

  port_down:
    label: "Port DOWN (ifAdminStatus)"
    oid_template: "1.3.6.1.2.1.2.2.1.7.{ifIndex}"
    type: "Integer"
    value: 2

  set_desc:
    label: "Set port description (ifAlias)"
    oid_template: "1.3.6.1.2.1.31.1.1.1.18.{ifIndex}"
    type: "OctetString"
    value_template: "{description}"

