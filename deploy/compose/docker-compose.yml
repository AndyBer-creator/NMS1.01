# По умолчанию api и worker в network_mode: host — весь стек в Docker, SNMP/UDP до LAN как с хоста
# (Linux, Docker в WSL2). DB_DSN в .env: host=127.0.0.1 (postgres публикует 5432 на хост).
# Docker Desktop для Windows часто не поддерживает host-сеть: тогда
# docker compose -f deploy/compose/docker-compose.bridge.yml up -d
# и DB_DSN с host=postgres; см. README.
services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    container_name: nms1-socket-proxy
    environment:
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      NETWORKS: 1
      NODES: 0
      SECRETS: 0
      POST: 0
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      IMAGES: 1
      INFO: 1
      PING: 1
      PLUGINS: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      VOLUMES: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "2375"
    networks:
      - nms-network
    restart: unless-stopped

  traefik:
    image: traefik:v3.0
    container_name: nms1-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL:-ops@example.com}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../letsencrypt:/letsencrypt
    networks:
      - nms-network
    depends_on:
      - socket-proxy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_DB: NMS
      POSTGRES_USER: nms-user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - nms-network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: nms-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://nms-user:${POSTGRES_PASSWORD}@postgres:5432/NMS?sslmode=${DB_SSLMODE_EXPORTER:-require}"
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nms-network
    restart: unless-stopped

  migration:
    build:
      context: ../../
      dockerfile: Dockerfile
      target: builder
    command:
    - /bin/sh
    - -c
    - |
      set -e
      echo "⏳ Running migration..."
      cd /app
      go run cmd/migration/main.go
      echo "🎉 Migration COMPLETED!"
    volumes:
      - ../../config.yaml:/app/config.yaml:ro
    environment:
      TZ: ${TZ:-UTC}
      DB_DSN: "${DB_DSN}"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: NMS
      POSTGRES_USER: nms-user
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nms-network

  api:
    build: ../../
    container_name: nms1-api-1
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}
      DB_DSN: "host=127.0.0.1 port=5432 user=nms-user password=${POSTGRES_PASSWORD} dbname=NMS sslmode=${DB_SSLMODE:-disable}"
      TELEGRAM_TOKEN: "${TELEGRAM_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      NMS_GRAFANA_BASE_URL: "${NMS_GRAFANA_BASE_URL}"
      NMS_PROMETHEUS_BASE_URL: "${NMS_PROMETHEUS_BASE_URL}"
      PROMETHEUS_BASE_URL: "${PROMETHEUS_BASE_URL}"
      NMS_GRPC_ADDR: "${NMS_GRPC_ADDR:-127.0.0.1:9091}"
      NMS_GRPC_AUTH_TOKEN: "${NMS_GRPC_AUTH_TOKEN:-change-me-grpc-ingest-token}"
      NMS_GRPC_ALLOW_INSECURE_INGEST: "${NMS_GRPC_ALLOW_INSECURE_INGEST:-true}"
      NMS_ADMIN_USER: "${NMS_ADMIN_USER}"
      NMS_ADMIN_PASS: "${NMS_ADMIN_PASS}"
      NMS_VIEWER_USER: "${NMS_VIEWER_USER}"
      NMS_VIEWER_PASS: "${NMS_VIEWER_PASS}"
      NMS_SESSION_SECRET: "${NMS_SESSION_SECRET}"
      NMS_DB_ENCRYPTION_KEY: "${NMS_DB_ENCRYPTION_KEY}"
      NMS_TERMINAL_SSH_KNOWN_HOSTS: "${NMS_TERMINAL_SSH_KNOWN_HOSTS}"
    volumes:
      - ../../logs:/app/logs:delegated
      - ../../config.yaml:/app/config.yaml:ro
      - ../../mibs:/app/mibs:ro
      - ../../.secrets:/app/secrets:ro
    cap_drop:
      - ALL
    entrypoint: ["./nms-api"]
    command: []
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/health | grep -q '^OK$' || wget --no-check-certificate -q -O- https://127.0.0.1:8080/health | grep -q '^OK$'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: nms-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "9090"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../../alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prom.rule=Host(`${NMS_PROM_HOST:-prom.nms.test.com}`)"
      - "traefik.http.routers.prom.entrypoints=websecure"
      - "traefik.http.routers.prom.tls=true"
      - "traefik.http.routers.prom.tls.certresolver=le"
      - "traefik.http.services.prom.loadbalancer.server.port=9090"
    networks:
      - nms-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: nms-alertmanager
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NMS_ALERT_WEBHOOK_TOKEN: ${NMS_ALERT_WEBHOOK_TOKEN:-}
      NMS_ALERT_WEBHOOK_TOKEN_FILE: ${NMS_ALERT_WEBHOOK_TOKEN_FILE:-}
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ../monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ../../scripts/render_alertmanager_config.sh:/usr/local/bin/render_alertmanager_config.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'bin="$$(command -v alertmanager || true)"; [ -n "$$bin" ] || bin=/bin/alertmanager; sh /usr/local/bin/render_alertmanager_config.sh /etc/alertmanager/alertmanager.yml /tmp/alertmanager.yml && exec "$$bin" --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager'
    networks:
      - nms-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: nms-grafana
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${NMS_GRAFANA_HOST:-grafana.nms.test.com}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - nms-network
    restart: unless-stopped

  
  worker:
    build: ../../
    container_name: nms1-worker-1
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}
      DB_DSN: "host=127.0.0.1 port=5432 user=nms-user password=${POSTGRES_PASSWORD} dbname=NMS sslmode=${DB_SSLMODE:-disable}"
    volumes:
      - ../../logs:/app/logs:delegated
      - ../../config.yaml:/app/config.yaml:ro
      - ../../mibs:/app/mibs:ro
    cap_drop:
      - ALL
    entrypoint: ["./nms-worker"]
    command: []
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8081/metrics >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    restart: unless-stopped

  trap-receiver:
    build: 
      context: ../../
      dockerfile: cmd/trap-receiver/Dockerfile
    container_name: nms1-trap-receiver
    network_mode: host
    user: "nms:nms"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    environment:
      TZ: ${TZ:-UTC}
      NMS_ENV: docker
      DB_DSN: "host=127.0.0.1 port=5432 user=nms-user password=${POSTGRES_PASSWORD} dbname=NMS sslmode=${DB_SSLMODE:-disable}"
      NMS_TRAP_GRPC_TARGET: "${NMS_TRAP_GRPC_TARGET:-127.0.0.1:9091}"
      NMS_TRAP_GRPC_AUTH_TOKEN: "${NMS_TRAP_GRPC_AUTH_TOKEN:-${NMS_GRPC_AUTH_TOKEN:-change-me-grpc-ingest-token}}"
      TELEGRAM_TOKEN: "${TELEGRAM_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
    volumes:
      - ../../logs:/app/logs:delegated
      - ../../config/critical_oids.json:/app/critical_oids.json:ro
      - ../../mibs:/app/mibs:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  nms-network:
    driver: bridge
