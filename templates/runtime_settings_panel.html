{{define "runtimeSettingsPanel"}}
<div class="space-y-3">
    {{if .Err}}
    <p class="text-sm text-red-400">{{.Err}}</p>
    {{end}}
    {{if .Saved}}
    <p class="text-sm text-emerald-400">Runtime settings saved.</p>
    {{end}}
    <p class="text-sm text-gray-300">
        Non-secret runtime settings only. Tokens/passwords stay in Docker secrets.
    </p>
    {{if .Admin}}
    <form class="grid grid-cols-1 sm:grid-cols-2 gap-3"
          hx-post="/settings/runtime"
          hx-target="#runtime-settings-panel-wrap"
          hx-swap="innerHTML">
        <div>
            <label class="block text-xs text-gray-400 mb-1">SMTP host</label>
            <input type="text" name="smtp_host" value="{{.SMTPHost}}" placeholder="smtp.example.com"
                   class="w-full p-3 bg-gray-900/60 border border-gray-600 rounded-lg focus:border-cyan-400 focus:outline-none">
        </div>
        <div>
            <label class="block text-xs text-gray-400 mb-1">SMTP port</label>
            <input type="number" name="smtp_port" value="{{.SMTPPort}}" placeholder="587"
                   class="w-full p-3 bg-gray-900/60 border border-gray-600 rounded-lg focus:border-cyan-400 focus:outline-none">
        </div>
        <div>
            <label class="block text-xs text-gray-400 mb-1">SMTP from</label>
            <input type="email" name="smtp_from" value="{{.SMTPFrom}}" placeholder="alerts@example.com"
                   class="w-full p-3 bg-gray-900/60 border border-gray-600 rounded-lg focus:border-cyan-400 focus:outline-none">
        </div>
        <div>
            <label class="block text-xs text-gray-400 mb-1">Grafana base URL</label>
            <input type="url" name="grafana_base_url" value="{{.GrafanaBaseURL}}" placeholder="https://grafana.example.com"
                   class="w-full p-3 bg-gray-900/60 border border-gray-600 rounded-lg focus:border-cyan-400 focus:outline-none">
        </div>
        <div class="sm:col-span-2">
            <label class="block text-xs text-gray-400 mb-1">Prometheus base URL</label>
            <input type="url" name="prometheus_base_url" value="{{.PrometheusBaseURL}}" placeholder="https://prom.example.com"
                   class="w-full p-3 bg-gray-900/60 border border-gray-600 rounded-lg focus:border-cyan-400 focus:outline-none">
        </div>
        <div class="sm:col-span-2">
            <button type="submit"
                    class="px-6 py-3 rounded-lg bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 font-semibold shadow-lg">
                Save runtime settings
            </button>
        </div>
    </form>
    {{else}}
    <p class="text-sm text-gray-400">View-only. Admin role required to change runtime settings.</p>
    {{end}}
</div>
{{end}}
