{{define "devicesTable"}}
<div class="overflow-x-auto" id="devices-table-root">
    <table class="w-full table-auto bg-gray-800/80 rounded-lg shadow-xl border border-gray-700/50">
        <thead>
            <tr class="bg-gray-700/50 border-b border-gray-600">
                <th class="p-4 text-left font-semibold text-gray-200">IP</th>
                <th class="p-4 text-left font-semibold text-gray-200">Имя</th>
                <th class="p-4 text-left font-semibold text-gray-200">Статус</th>
                <th class="p-4 text-left font-semibold text-gray-200">Последняя активность</th>
                <th class="p-4 text-right font-semibold w-36 text-gray-200">Действия</th>
            </tr>
        </thead>
        <tbody id="devices-list">
            {{if .Devices}}
                {{range .Devices}}
                <tr class="border-b border-gray-700/80 hover:bg-gray-700/40 transition-colors">
                    <td class="p-4 font-mono text-sm text-cyan-300/90">{{.IP}}</td>
                    <td class="p-4 font-medium text-white">{{.Name}}</td>
                    <td class="p-4">
                        <span class="px-3 py-1 {{.StatusClass}} rounded-full text-sm border">{{.StatusIcon}} {{.Status}}</span>
                    </td>
                    <td class="p-4 text-sm text-gray-400">{{.LastSeen}}</td>
                    <td class="p-4 text-right">
                        <button type="button"
                                class="px-3 py-1.5 bg-red-500/90 hover:bg-red-600 text-white rounded-lg text-xs font-medium transition-all inline-flex items-center gap-1 shadow-sm hover:shadow-md"
                                hx-delete="/devices/{{.IP}}"
                                hx-target="#devices-table-root"
                                hx-swap="outerHTML"
                                hx-confirm="Удалить {{.Name}} ({{.IP}})?&#10;Действие нельзя отменить."
                                hx-on:htmx:before-request="this.innerHTML='⏳'"
                                hx-on:htmx:after-request="this.innerHTML='🗑️'">
                            🗑️ удалить
                        </button>
                    </td>
                </tr>
                {{end}}
            {{else}}
                <tr>
                    <td colspan="5" class="p-10 text-center text-gray-500">
                        📭 Нет устройств. Добавьте первое на <a href="/" class="text-blue-400 hover:underline">дашборде</a>.
                    </td>
                </tr>
            {{end}}
        </tbody>
    </table>
    <div class="mt-4 text-sm text-gray-400 text-center">Всего: <span class="text-gray-200 font-medium">{{.Total}}</span> устройств</div>
</div>
{{end}}
