<div class="overflow-x-auto">
    <table class="w-full table-auto bg-gray-800 rounded-lg shadow-xl">
        <thead>
            <tr class="bg-gray-700/50 border-b border-gray-600">
                <th class="p-4 text-left font-semibold">IP</th>
                <th class="p-4 text-left font-semibold">Name</th>
                <th class="p-4 text-left font-semibold">Status</th>
                <th class="p-4 text-left font-semibold">Last Seen</th>
                <th class="p-4 text-right font-semibold w-32">Actions</th>
            </tr>
        </thead>
        <tbody id="devices-list">
            {{if .Devices}}
                {{range .Devices}}
                <tr class="border-b border-gray-700 hover:bg-gray-700/50 transition-colors">
                    <td class="p-4 font-mono bg-gray-900/50 rounded">{{.IP}}</td>
                    <td class="p-4 font-medium">{{.Name}}</td>
                    <td class="p-4">
                        <span class="px-3 py-1 {{.StatusClass}} rounded-full text-sm border">{{.StatusIcon}} {{.Status}}</span>
                    </td>
                    <td class="p-4 text-sm text-gray-400">{{.LastSeen}}</td>
                    <td class="p-4 text-right">
                        <button class="px-3 py-1.5 bg-red-500 hover:bg-red-600 text-white rounded-lg text-xs font-medium transition-all inline-flex items-center gap-1 shadow-sm hover:shadow-md ml-2"
                                hx-delete="/devices/{{.IP}}"
                                hx-target="#devices-preview"
                                hx-swap="innerHTML"
                                hx-confirm="🗑️ Удалить {{.Name}} ({{.IP}})?&#10;Это действие нельзя отменить."
                                hx-on:htmx:before-request="this.innerHTML='⏳'"
                                hx-on:htmx:after-request="this.innerHTML='🗑️'">
                            🗑️ удалить
                        </button>
                    </td>
                </tr>
                {{end}}
            {{else}}
                <tr>
                    <td colspan="5" class="p-8 text-center text-gray-500">
                        📭 Нет устройств. Добавь первое!
                    </td>
                </tr>
            {{end}}
        </tbody>
    </table>
    <div class="mt-4 text-sm text-gray-400 text-center">Всего: {{.Total}} устройств</div>
</div>
