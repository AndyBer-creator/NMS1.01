<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NMS1 — История недоступности</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
<div class="container mx-auto px-4 py-8 max-w-7xl">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6 mb-10">
        <div class="flex items-center gap-4">
            <a href="/" class="shrink-0 opacity-90 hover:opacity-100 transition-opacity">
                <img src="/static/logo.svg" alt="NMS1" class="h-16 w-auto drop-shadow-2xl">
            </a>
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-rose-400 to-amber-500 bg-clip-text text-transparent">
                    История доступности
                </h1>
                <p class="text-gray-400 mt-1 text-sm">Переходы в недоступность и восстановление по результатам SNMP-опроса worker</p>
            </div>
        </div>
        <a href="/"
           class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl bg-gray-800 hover:bg-gray-700 border border-gray-600 text-sm font-medium transition-all hover:scale-[1.02] shadow-lg">
            ← На дашборд
        </a>
    </div>

    <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700/50 mb-6">
        <div class="flex flex-col md:flex-row md:items-end gap-4 mb-6">
            <div class="w-full md:w-32">
                <label class="block text-sm text-gray-300 mb-2">Лимит</label>
                <input id="ev-limit" type="number" min="1" max="2000" value="200"
                       class="w-full p-3 bg-gray-900/60 border border-gray-600 rounded-lg focus:border-rose-400 focus:outline-none">
            </div>
            <div class="w-full md:w-40">
                <label class="block text-sm text-gray-300 mb-2">device_id (опц.)</label>
                <input id="ev-device" type="number" min="0" placeholder="все"
                       class="w-full p-3 bg-gray-900/60 border border-gray-600 rounded-lg focus:border-rose-400 focus:outline-none">
            </div>
            <button id="ev-refresh" type="button"
                    class="px-6 py-3 rounded-lg bg-gradient-to-r from-rose-600 to-amber-600 hover:from-rose-500 hover:to-amber-500 font-semibold">
                Обновить
            </button>
        </div>
        <div id="ev-summary" class="text-sm text-gray-400 mb-4">Загрузка…</div>
        <div class="overflow-x-auto">
            <table class="w-full table-auto bg-gray-900/50 rounded-lg border border-gray-700/60 text-sm">
                <thead>
                <tr class="bg-gray-700/50 border-b border-gray-600">
                    <th class="p-3 text-left text-gray-200 whitespace-nowrap w-20" title="ID записи в device_availability_events">ID</th>
                    <th class="p-3 text-left text-gray-200 whitespace-nowrap w-20" title="devices.id">Устр.</th>
                    <th class="p-3 text-left text-gray-200">Время</th>
                    <th class="p-3 text-left text-gray-200">Событие</th>
                    <th class="p-3 text-left text-gray-200">Устройство</th>
                    <th class="p-3 text-left text-gray-200">Детали</th>
                </tr>
                </thead>
                <tbody id="ev-body">
                <tr><td colspan="6" class="p-6 text-center text-gray-500">Загрузка…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script nonce="{{.CSPNonce}}">
(function () {
    const limitEl = document.getElementById('ev-limit');
    const devEl = document.getElementById('ev-device');
    const btn = document.getElementById('ev-refresh');
    const body = document.getElementById('ev-body');
    const summary = document.getElementById('ev-summary');

    function esc(s) {
        return String(s ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
    }

    function kindLabel(k) {
        if (k === 'unavailable') return '<span class="text-red-400 font-medium">Недоступно</span>';
        if (k === 'available') return '<span class="text-emerald-400 font-medium">Доступно</span>';
        return esc(k);
    }

    async function load() {
        const limit = Math.max(1, Math.min(2000, parseInt(limitEl.value || '200', 10) || 200));
        const dev = (devEl.value || '').trim();
        let url = '/events/availability?limit=' + limit;
        if (dev) url += '&device_id=' + encodeURIComponent(dev);
        summary.textContent = 'Загрузка…';
        btn.disabled = true;
        try {
            const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
            const text = await res.text();
            if (!res.ok) {
                body.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-red-400">Ошибка ' + res.status + ': ' + esc(text) + '</td></tr>';
                summary.textContent = 'Ошибка';
                return;
            }
            const rows = JSON.parse(text);
            if (!Array.isArray(rows) || rows.length === 0) {
                body.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-gray-500">Событий пока нет (после миграции и циклов опроса появятся переходы)</td></tr>';
                summary.textContent = '0 записей';
                return;
            }
            let html = '';
            for (const e of rows) {
                const evId = (e.id != null && e.id !== '') ? esc(String(e.id)) : '—';
                const devId = (e.device_id != null && e.device_id !== '') ? esc(String(e.device_id)) : '—';
                const t = e.occurred_at ? new Date(e.occurred_at).toLocaleString() : '—';
                const devLabel = esc(e.name || '') + ' <span class="text-cyan-300/90 font-mono text-xs">' + esc(e.ip || '') + '</span>';
                html += '<tr class="border-b border-gray-700/70 hover:bg-gray-700/30 align-top">';
                html += '<td class="p-3 text-gray-400 font-mono text-xs tabular-nums whitespace-nowrap">' + evId + '</td>';
                html += '<td class="p-3 text-gray-400 font-mono text-xs tabular-nums whitespace-nowrap">' + devId + '</td>';
                html += '<td class="p-3 text-gray-300 whitespace-nowrap">' + esc(t) + '</td>';
                html += '<td class="p-3">' + kindLabel(e.kind) + '</td>';
                html += '<td class="p-3">' + devLabel + '</td>';
                html += '<td class="p-3 text-xs text-gray-400 break-all max-w-xl">' + esc(e.detail || '') + '</td>';
                html += '</tr>';
            }
            body.innerHTML = html;
            summary.textContent = 'Записей: ' + rows.length;
        } catch (e) {
            body.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-red-400">' + esc(e.message || e) + '</td></tr>';
            summary.textContent = 'Ошибка';
        } finally {
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', load);
    load();
    setInterval(load, 60000);
})();
</script>
</body>
</html>
