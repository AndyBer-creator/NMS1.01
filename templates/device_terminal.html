<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Терминал — {{.Name}} ({{.IP}})</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="stylesheet" href="/static/css/xterm.css">
    <style nonce="{{.CSPNonce}}">
        body {
            margin: 0;
        }
        #terminal-header,
        #terminal-toolbar,
        #term-error-panel {
            position: relative;
            z-index: 2;
        }
        #terminal-wrap {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }
        #terminal-wrap .xterm {
            height: 100% !important;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100">
<div class="flex flex-col">
    <header id="terminal-header" class="flex flex-wrap items-center gap-3 px-4 py-3 border-b border-gray-700 bg-gray-800/90 shrink-0">
        <a href="/devices/list" class="text-blue-400 hover:underline text-sm">← Устройства</a>
        <span class="text-gray-500">|</span>
        <h1 class="text-lg font-semibold text-white">Терминал: {{.Name}}</h1>
        <span class="font-mono text-cyan-300/90 text-sm">{{.IP}}</span>
        <span class="text-xs px-2 py-0.5 rounded bg-gray-700 text-gray-300 uppercase">{{.Kind}}</span>
    </header>
    <div id="terminal-toolbar" class="flex flex-wrap items-end gap-3 px-4 py-3 bg-gray-800/50 border-b border-gray-700 shrink-0">
        <label class="flex flex-col text-xs text-gray-400 gap-1">
            SSH user
            <input id="ssh-user" type="text" autocomplete="username" placeholder="admin"
                   class="w-48 px-2 py-1.5 rounded bg-gray-800 border border-gray-600 text-white text-sm focus:border-blue-400 focus:outline-none">
        </label>
        <label class="flex flex-col text-xs text-gray-400 gap-1">
            Пароль
            <input id="ssh-pass" type="password" autocomplete="current-password" placeholder="••••••••"
                   class="w-48 px-2 py-1.5 rounded bg-gray-800 border border-gray-600 text-white text-sm focus:border-blue-400 focus:outline-none">
        </label>
        <label class="flex flex-col text-xs text-gray-400 gap-1">
            Порт
            <input id="ssh-port" type="number" value="22" min="1" max="65535"
                   class="w-24 px-2 py-1.5 rounded bg-gray-800 border border-gray-600 text-white text-sm focus:border-blue-400 focus:outline-none">
        </label>
        <button type="button" id="btn-connect"
                class="mt-5 px-4 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium">
            Подключиться
        </button>
        <button type="button" id="btn-disconnect" disabled
                class="mt-5 px-4 py-1.5 rounded-lg bg-gray-600 hover:bg-gray-500 text-white text-sm font-medium disabled:opacity-40">
            Отключить
        </button>
        <span id="term-status" class="text-sm text-gray-400 ml-auto"></span>
    </div>
    <div id="term-error-panel" class="hidden px-4 py-2 bg-gray-900/95 border-b border-red-900/40">
        <div class="flex flex-wrap items-start gap-2 justify-between">
            <pre id="term-last-error" class="text-red-300 font-mono text-xs whitespace-pre-wrap break-all flex-1 min-w-0 max-h-36 overflow-auto m-0 select-all cursor-text"></pre>
            <button type="button" id="btn-copy-err"
                    class="shrink-0 px-3 py-1 rounded-lg bg-gray-700 hover:bg-gray-600 text-xs text-white">
                Копировать текст
            </button>
        </div>
    </div>
    <div id="terminal-wrap" class="p-0 bg-black"></div>
</div>
<script src="/static/js/xterm.js"></script>
<script src="/static/js/xterm-addon-fit.js"></script>
<script nonce="{{.CSPNonce}}">
(function () {
    const deviceId = {{.DeviceID}};
    const rawKind = {{printf "%q" .Kind}};
    const kind = String(rawKind || "").replace(/^[\"']+|[\"']+$/g, "");
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsPathWithQuery = '/ws/terminal/' + deviceId +
        '?kind=' + encodeURIComponent(kind);
    const wsURL = wsProto + '//' + location.host + wsPathWithQuery;
    const textEnc = new TextEncoder();
    let ws = null;
    let sessionReady = false;
    let hangTimer = null;
    let wsOpenTimer = null;

    function clearHangTimer() {
        if (hangTimer) {
            clearTimeout(hangTimer);
            hangTimer = null;
        }
    }
    function clearWsOpenTimer() {
        if (wsOpenTimer) {
            clearTimeout(wsOpenTimer);
            wsOpenTimer = null;
        }
    }

    const term = new Terminal({
        cursorBlink: true,
        fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace',
        fontSize: 14,
        theme: { background: '#0b0f14', foreground: '#e6edf3' }
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    const terminalWrap = document.getElementById('terminal-wrap');
    term.open(terminalWrap);
    fitAddon.fit();
    term.onData(function (data) {
        if (!sessionReady || !ws || ws.readyState !== WebSocket.OPEN) {
            return;
        }
        ws.send(textEnc.encode(data));
    });

    const statusEl = document.getElementById('term-status');
    const btnConnect = document.getElementById('btn-connect');
    const btnDisconnect = document.getElementById('btn-disconnect');
    const errPanel = document.getElementById('term-error-panel');
    const errPre = document.getElementById('term-last-error');
    const btnCopyErr = document.getElementById('btn-copy-err');
    let lastErrorText = '';

    function setStatus(t) { statusEl.textContent = t || ''; }

    function clearErrorPanel() {
        lastErrorText = '';
        errPre.textContent = '';
        errPanel.classList.add('hidden');
        fitTerminalBurst();
    }

    function setLastError(msg) {
        var s = (msg || '').trim();
        if (!s) return;
        lastErrorText = s;
        errPre.textContent = s;
        errPanel.classList.remove('hidden');
        fitTerminalBurst();
    }

    btnCopyErr.addEventListener('click', function () {
        if (!lastErrorText) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(lastErrorText).then(function () {
                setStatus('Текст скопирован в буфер обмена');
            }).catch(function () {
                errPre.focus();
                var r = document.createRange();
                r.selectNodeContents(errPre);
                var sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(r);
            });
        } else {
            errPre.focus();
            var r = document.createRange();
            r.selectNodeContents(errPre);
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(r);
        }
    });

    function sendResize() {
        if (!sessionReady || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({
            type: 'resize',
            cols: term.cols,
            rows: term.rows
        }));
    }

    function fitTerminal() {
        try {
            const headerEl = document.getElementById('terminal-header');
            const toolbarEl = document.getElementById('terminal-toolbar');
            const errPanelEl = document.getElementById('term-error-panel');
            const viewportH = window.innerHeight || document.documentElement.clientHeight || 800;
            const usedH =
                (headerEl ? headerEl.offsetHeight : 0) +
                (toolbarEl ? toolbarEl.offsetHeight : 0) +
                ((errPanelEl && !errPanelEl.classList.contains('hidden')) ? errPanelEl.offsetHeight : 0);
            const targetH = Math.max(220, viewportH - usedH);
            terminalWrap.style.top = usedH + 'px';
            terminalWrap.style.height = targetH + 'px';
            fitAddon.fit();
            if (sessionReady) sendResize();
        } catch (e) {}
    }

    function fitTerminalBurst() {
        fitTerminal();
        setTimeout(fitTerminal, 0);
        setTimeout(fitTerminal, 120);
        setTimeout(fitTerminal, 350);
    }

    window.addEventListener('resize', fitTerminalBurst);
    if (window.ResizeObserver) {
        new ResizeObserver(function () {
            fitTerminalBurst();
        }).observe(terminalWrap);
    }
    terminalWrap.addEventListener('click', function () { term.focus(); });
    fitTerminalBurst();


    function strFromBuf(ab) {
        const u8 = new Uint8Array(ab);
        let s = '';
        const chunk = 8192;
        for (let i = 0; i < u8.length; i += chunk) {
            s += String.fromCharCode.apply(null, u8.subarray(i, Math.min(i + chunk, u8.length)));
        }
        return s;
    }

    btnDisconnect.addEventListener('click', function () {
        sessionReady = false;
        clearHangTimer();
        clearWsOpenTimer();
        if (ws) {
            ws.close();
            ws = null;
        }
        term.writeln('\r\n\x1b[33mСоединение закрыто.\x1b[0m');
        btnConnect.disabled = false;
        btnDisconnect.disabled = true;
        setStatus('');
    });

    btnConnect.addEventListener('click', function () {
        if (ws && ws.readyState === WebSocket.OPEN) return;
        sessionReady = false;
        clearHangTimer();
        clearWsOpenTimer();
        clearErrorPanel();
        term.reset();
        fitTerminalBurst();
        setStatus('Подключение…');
        btnConnect.disabled = true;
        btnDisconnect.disabled = false;

        // Use same-origin admin session cookie for WS auth.
        // Subprotocol auth is optional fallback on server side and can fail
        // in browsers/proxies when protocol negotiation is strict.
        ws = new WebSocket(wsURL);
        ws.binaryType = 'arraybuffer';

        wsOpenTimer = setTimeout(function () {
            if (ws && ws.readyState !== WebSocket.OPEN) {
                var hint = 'Таймаут WebSocket (20 с): сервер не ответил на upgrade. Откройте F12 → Network → WS — есть ли запрос к ' + wsPathWithQuery + '? Проверьте тот же хост/схему (http/https), что в адресной строке, и docker logs nms1-api-1 (строки nms-api: terminal-ws).';
                setLastError(hint);
                setStatus('Таймаут WebSocket');
                try { if (ws) ws.close(); } catch (e) {}
                btnConnect.disabled = false;
                btnDisconnect.disabled = true;
                ws = null;
            }
            wsOpenTimer = null;
        }, 20000);

        ws.onopen = function () {
            clearWsOpenTimer();
            try {
                let init;
                const sshUserEl = document.getElementById('ssh-user');
                const sshPassEl = document.getElementById('ssh-pass');
                const sshPortEl = document.getElementById('ssh-port');
                const user = (sshUserEl && sshUserEl.value ? sshUserEl.value : '').trim();
                const pass = sshPassEl && sshPassEl.value ? sshPassEl.value : '';
                const port = parseInt(sshPortEl ? sshPortEl.value : '22', 10) || 22;
                init = { type: 'init', username: user, password: pass, port: port };
                ws.send(JSON.stringify(init));
                setStatus('Ожидание ответа сервера…');
                clearHangTimer();
                hangTimer = setTimeout(function () {
                    if (!sessionReady && ws && ws.readyState === WebSocket.OPEN) {
                        var msg = 'Таймаут: за 150 с нет ответа от сервера. Пересоберите API, проверьте сеть до устройства с хоста, где крутится nms-api.';
                        setLastError(msg);
                        setStatus('Таймаут');
                        try { ws.close(); } catch (e) {}
                    }
                }, 150000);
            } catch (e) {
                var em = 'Ошибка инициализации WebSocket: ' + (e && e.message ? e.message : String(e));
                setLastError(em);
                setStatus('Ошибка инициализации');
                try { if (ws) ws.close(); } catch (closeErr) {}
            }
        };

        function tryHandleJsonText(s) {
            if (!s || s.charAt(0) !== '{') return false;
            try {
                var j = JSON.parse(s);
                if (j.type === 'error') {
                    clearHangTimer();
                    var em = j.message || 'ошибка';
                    setLastError(em);
                    setStatus('Ошибка: ' + em);
                    term.writeln('\r\n\x1b[31m' + em + '\x1b[0m');
                    ws.close();
                    return true;
                }
                if (j.type === 'connecting') {
                    setStatus(j.message || 'Подключение к устройству…');
                    return true;
                }
                if (j.type === 'ok') {
                    clearHangTimer();
                    sessionReady = true;
                    setStatus('Сессия');
                    fitTerminalBurst();
                    term.focus();
                    sendResize();
                    return true;
                }
            } catch (e) {}
            return false;
        }

        ws.onmessage = function (ev) {
            if (typeof ev.data === 'string') {
                if (tryHandleJsonText(ev.data)) return;
                return;
            }
            if (ev.data instanceof Blob) {
                ev.data.text().then(function (t) {
                    if (tryHandleJsonText(t)) return;
                    term.write(t);
                });
                return;
            }
            if (ev.data instanceof ArrayBuffer) {
                var dec = new TextDecoder('utf-8', { fatal: false }).decode(ev.data);
                if (tryHandleJsonText(dec)) return;
                term.write(strFromBuf(ev.data));
            }
        };

        ws.onerror = function () {
            clearWsOpenTimer();
            var em = 'Ошибка WebSocket (сеть или отказ в upgrade). Проверьте F12 → Console/Network, совпадение Origin и URL страницы, при прокси — NMS_TRUSTED_PROXIES и заголовки X-Forwarded-* .';
            setLastError(em);
            setStatus('Ошибка WebSocket');
        };
        ws.onclose = function (ev) {
            sessionReady = false;
            clearHangTimer();
            clearWsOpenTimer();
            ws = null;
            btnConnect.disabled = false;
            btnDisconnect.disabled = true;
            if (ev && ev.code && ev.code !== 1000) {
                var tail = 'WebSocket закрыт: code=' + ev.code + (ev.reason ? (', reason=' + ev.reason) : '');
                setStatus(tail);
                setLastError((lastErrorText ? lastErrorText + '\n' : '') + tail);
                return;
            }
            if (!statusEl.textContent.startsWith('Ошибка')) setStatus('');
        };
    });
})();
</script>
</body>
</html>
