<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NMS1 - Trap OID Mappings</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-gray-900 text-white min-h-screen">
<div class="container mx-auto px-4 py-8 max-w-7xl">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6 mb-10">
        <div class="flex items-center gap-4">
            <a href="/" class="shrink-0 opacity-90 hover:opacity-100 transition-opacity">
                <img src="/static/logo.svg" alt="NMS1" class="h-16 w-auto drop-shadow-2xl">
            </a>
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-orange-300 to-amber-500 bg-clip-text text-transparent">
                    Trap OID Mappings
                </h1>
                <p class="text-gray-400 mt-1 text-sm">Vendor profile rules for trap classification and correlation.</p>
            </div>
        </div>
        <a href="/"
           class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl bg-gray-800 hover:bg-gray-700 border border-gray-600 text-sm font-medium transition-all hover:scale-[1.02] shadow-lg">
            <- На дашборд
        </a>
    </div>

    <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700/50 mb-8">
        <h2 id="map-form-title" class="text-xl font-semibold mb-4">Создать mapping rule (admin)</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <input id="map-vendor" placeholder="vendor (default: generic)" class="p-3 bg-gray-900/60 border border-gray-600 rounded-lg">
            <input id="map-pattern" placeholder="oid_pattern, e.g. %linkdown%" class="p-3 bg-gray-900/60 border border-gray-600 rounded-lg">
            <input id="map-title" placeholder="title" class="p-3 bg-gray-900/60 border border-gray-600 rounded-lg">
            <select id="map-signal-kind" class="p-3 bg-gray-900/60 border border-gray-600 rounded-lg">
                <option value="generic">generic</option>
                <option value="link_down">link_down</option>
                <option value="link_up">link_up</option>
                <option value="bfd_down">bfd_down</option>
                <option value="bfd_up">bfd_up</option>
            </select>
            <select id="map-severity" class="p-3 bg-gray-900/60 border border-gray-600 rounded-lg">
                <option value="warning">warning</option>
                <option value="critical">critical</option>
                <option value="info">info</option>
            </select>
            <input id="map-priority" type="number" value="100" class="p-3 bg-gray-900/60 border border-gray-600 rounded-lg">
            <label class="flex items-center gap-2 text-sm text-gray-300 p-3">
                <input id="map-recovery" type="checkbox">
                is_recovery
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-300 p-3">
                <input id="map-enabled" type="checkbox" checked>
                enabled
            </label>
            <button id="map-submit" class="px-4 py-3 rounded-lg bg-amber-700 hover:bg-amber-600 disabled:opacity-50 disabled:cursor-not-allowed">Create</button>
            <button id="map-cancel-edit" class="px-4 py-3 rounded-lg bg-gray-700 hover:bg-gray-600 hidden disabled:opacity-50 disabled:cursor-not-allowed">Cancel edit</button>
        </div>
        <p id="map-status" class="text-sm text-gray-400 mt-3"></p>
    </div>

    <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700/50">
        <div class="flex flex-col gap-3 mb-4">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-semibold">Existing mappings</h2>
                <div class="flex items-center gap-3">
                    <span id="map-loading" class="text-xs text-amber-300 hidden">Loading...</span>
                    <button id="map-refresh" type="button" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed">Refresh</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <input id="map-filter-vendor" placeholder="filter vendor" class="p-2 bg-gray-900/60 border border-gray-600 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed">
                <select id="map-filter-enabled" class="p-2 bg-gray-900/60 border border-gray-600 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed">
                    <option value="">all</option>
                    <option value="true">enabled=true</option>
                    <option value="false">enabled=false</option>
                </select>
                <button id="map-apply-filters" type="button" class="px-4 py-2 rounded-lg bg-amber-700 hover:bg-amber-600 disabled:opacity-50 disabled:cursor-not-allowed">Apply filters</button>
                <button id="map-clear-filters" type="button" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed">Clear filters</button>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full table-auto bg-gray-900/50 rounded-lg border border-gray-700/60">
                <thead>
                <tr class="bg-gray-700/50 border-b border-gray-600">
                    <th class="p-2 text-left">ID</th>
                    <th class="p-2 text-left">Vendor</th>
                    <th class="p-2 text-left">Pattern</th>
                    <th class="p-2 text-left">Signal</th>
                    <th class="p-2 text-left">Title</th>
                    <th class="p-2 text-left">Severity</th>
                    <th class="p-2 text-left">Priority</th>
                    <th class="p-2 text-left">Flags</th>
                    <th class="p-2 text-left">Actions</th>
                </tr>
                </thead>
                <tbody id="map-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script nonce="{{.CSPNonce}}">
(function () {
    const bodyEl = document.getElementById('map-body');
    const statusEl = document.getElementById('map-status');
    const loadingEl = document.getElementById('map-loading');
    const refreshBtn = document.getElementById('map-refresh');
    const submitBtn = document.getElementById('map-submit');
    const cancelEditBtn = document.getElementById('map-cancel-edit');
    const formTitleEl = document.getElementById('map-form-title');
    const vendorEl = document.getElementById('map-vendor');
    const patternEl = document.getElementById('map-pattern');
    const signalKindEl = document.getElementById('map-signal-kind');
    const titleEl = document.getElementById('map-title');
    const severityEl = document.getElementById('map-severity');
    const recoveryEl = document.getElementById('map-recovery');
    const priorityEl = document.getElementById('map-priority');
    const enabledEl = document.getElementById('map-enabled');
    const filterVendorEl = document.getElementById('map-filter-vendor');
    const filterEnabledEl = document.getElementById('map-filter-enabled');
    const applyFiltersBtn = document.getElementById('map-apply-filters');
    const clearFiltersBtn = document.getElementById('map-clear-filters');
    let vendorFilterTimer = null;
    let editID = null;
    let mappingsByID = {};
    let requestInFlight = false;
    let submitInFlight = false;

    function csrf() {
        const p = (document.cookie || '').split('; ').find(function (x) { return x.indexOf('nms_csrf=') === 0; });
        return p ? decodeURIComponent(p.slice('nms_csrf='.length)) : '';
    }

    function esc(v) {
        return String(v || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
    }

    function row(m) {
        return '<tr class="border-b border-gray-700/70 hover:bg-gray-700/30">' +
            '<td class="p-2 font-mono text-xs">' + esc(m.id) + '</td>' +
            '<td class="p-2 text-xs">' + esc(m.vendor) + '</td>' +
            '<td class="p-2 text-xs">' + esc(m.oid_pattern) + '</td>' +
            '<td class="p-2 text-xs">' + esc(m.signal_kind) + '</td>' +
            '<td class="p-2 text-xs">' + esc(m.title) + '</td>' +
            '<td class="p-2 text-xs">' + esc(m.severity) + '</td>' +
            '<td class="p-2 text-xs">' + esc(m.priority) + '</td>' +
            '<td class="p-2 text-xs">' + (m.is_recovery ? 'recovery ' : '') + (m.enabled ? 'enabled' : 'disabled') + '</td>' +
            '<td class="p-2 text-xs flex gap-2">' +
            '<button type="button" class="px-2 py-1 rounded bg-blue-700 hover:bg-blue-600" data-edit="' + esc(m.id) + '">edit</button>' +
            '<button type="button" class="px-2 py-1 rounded bg-red-700 hover:bg-red-600" data-del="' + esc(m.id) + '">delete</button>' +
            '</td>' +
            '</tr>';
    }

    function payloadFromForm() {
        return {
            vendor: (vendorEl.value || '').trim() || 'generic',
            oid_pattern: (patternEl.value || '').trim(),
            signal_kind: signalKindEl.value,
            title: (titleEl.value || '').trim(),
            severity: severityEl.value,
            is_recovery: recoveryEl.checked,
            priority: parseInt(priorityEl.value || '100', 10) || 100,
            enabled: enabledEl.checked
        };
    }

    function resetFormToCreate() {
        editID = null;
        formTitleEl.textContent = 'Создать mapping rule (admin)';
        submitBtn.textContent = 'Create';
        cancelEditBtn.classList.add('hidden');
        vendorEl.value = '';
        patternEl.value = '';
        signalKindEl.value = 'generic';
        titleEl.value = '';
        severityEl.value = 'warning';
        recoveryEl.checked = false;
        priorityEl.value = '100';
        enabledEl.checked = true;
        // Keep typing flow smooth after actions; avoid first key on stale focused button.
        setTimeout(function () { vendorEl.focus(); }, 0);
    }

    function startEdit(id) {
        const m = mappingsByID[String(id)];
        if (!m) {
            statusEl.textContent = 'Mapping not found for edit';
            return;
        }
        editID = Number(id);
        formTitleEl.textContent = 'Редактировать mapping #' + id;
        submitBtn.textContent = 'Update';
        cancelEditBtn.classList.remove('hidden');
        vendorEl.value = m.vendor || '';
        patternEl.value = m.oid_pattern || '';
        signalKindEl.value = m.signal_kind || 'generic';
        titleEl.value = m.title || '';
        severityEl.value = m.severity || 'warning';
        recoveryEl.checked = !!m.is_recovery;
        priorityEl.value = String(m.priority || 100);
        enabledEl.checked = !!m.enabled;
        // Focus a text input immediately so first typed character is not lost on button focus.
        setTimeout(function () { titleEl.focus(); }, 0);
    }

    function buildListURL() {
        const p = new URLSearchParams();
        const vendor = (filterVendorEl.value || '').trim();
        const enabled = (filterEnabledEl.value || '').trim();
        if (vendor) p.set('vendor', vendor);
        if (enabled === 'true' || enabled === 'false') p.set('enabled', enabled);
        const qs = p.toString();
        return '/trap-oid-mappings' + (qs ? ('?' + qs) : '');
    }

    function syncFiltersToPageURL() {
        const p = new URLSearchParams();
        const vendor = (filterVendorEl.value || '').trim();
        const enabled = (filterEnabledEl.value || '').trim();
        if (vendor) p.set('vendor', vendor);
        if (enabled === 'true' || enabled === 'false') p.set('enabled', enabled);
        const next = window.location.pathname + (p.toString() ? ('?' + p.toString()) : '');
        window.history.replaceState({}, '', next);
    }

    function loadFiltersFromPageURL() {
        const p = new URLSearchParams(window.location.search || '');
        filterVendorEl.value = (p.get('vendor') || '').trim();
        const enabled = (p.get('enabled') || '').trim();
        if (enabled === 'true' || enabled === 'false') {
            filterEnabledEl.value = enabled;
        } else {
            filterEnabledEl.value = '';
        }
    }

    function setListControlsDisabled(disabled) {
        refreshBtn.disabled = disabled;
        applyFiltersBtn.disabled = disabled;
        clearFiltersBtn.disabled = disabled;
        filterVendorEl.disabled = disabled;
        filterEnabledEl.disabled = disabled;
    }

    function setSubmitControlsDisabled(disabled) {
        submitBtn.disabled = disabled;
        cancelEditBtn.disabled = disabled;
    }

    async function loadMappings() {
        if (requestInFlight) {
            return;
        }
        requestInFlight = true;
        statusEl.textContent = 'Loading...';
        loadingEl.classList.remove('hidden');
        setListControlsDisabled(true);
        syncFiltersToPageURL();
        try {
            const res = await fetch(buildListURL(), { headers: { 'Accept': 'application/json' } });
            const txt = await res.text();
            if (!res.ok) {
                statusEl.textContent = 'Error ' + res.status + ': ' + txt;
                return;
            }
            const items = JSON.parse(txt);
            mappingsByID = {};
            (items || []).forEach(function (m) { mappingsByID[String(m.id)] = m; });
            bodyEl.innerHTML = (items || []).map(row).join('') || '<tr><td colspan="9" class="p-4 text-center text-gray-500">No mappings</td></tr>';
            statusEl.textContent = 'Loaded ' + (items || []).length + ' mapping(s)';
        } catch (e) {
            statusEl.textContent = 'Network error: ' + (e && e.message ? e.message : e);
        } finally {
            requestInFlight = false;
            setListControlsDisabled(false);
            loadingEl.classList.add('hidden');
        }
    }

    async function submitMapping() {
        if (submitInFlight) {
            return;
        }
        submitInFlight = true;
        setSubmitControlsDisabled(true);
        const payload = payloadFromForm();
        const isEdit = editID !== null;
        const url = isEdit ? '/trap-oid-mappings?id=' + encodeURIComponent(editID) : '/trap-oid-mappings';
        const method = isEdit ? 'PUT' : 'POST';
        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', 'X-CSRF-Token': csrf() },
                body: JSON.stringify(payload)
            });
            const txt = await res.text();
            if (!res.ok) {
                statusEl.textContent = (isEdit ? 'Update failed: ' : 'Create failed: ') + txt;
                return;
            }
            statusEl.textContent = isEdit ? ('Updated mapping #' + editID) : 'Created mapping';
            resetFormToCreate();
            await loadMappings();
        } catch (e) {
            statusEl.textContent = (isEdit ? 'Update network error: ' : 'Create network error: ') + (e && e.message ? e.message : e);
        } finally {
            submitInFlight = false;
            setSubmitControlsDisabled(false);
        }
    }

    async function deleteMapping(id) {
        if (submitInFlight) {
            return;
        }
        submitInFlight = true;
        setSubmitControlsDisabled(true);
        try {
            const res = await fetch('/trap-oid-mappings?id=' + encodeURIComponent(id), {
                method: 'DELETE',
                headers: { 'Accept': 'application/json', 'X-CSRF-Token': csrf() }
            });
            const txt = await res.text();
            if (!res.ok) {
                statusEl.textContent = 'Delete failed: ' + txt;
                return;
            }
            statusEl.textContent = 'Deleted mapping #' + id;
            await loadMappings();
        } catch (e) {
            statusEl.textContent = 'Delete network error: ' + (e && e.message ? e.message : e);
        } finally {
            submitInFlight = false;
            setSubmitControlsDisabled(false);
        }
    }

    document.addEventListener('click', function (e) {
        const edit = e.target && e.target.closest('[data-edit]');
        if (edit) {
            startEdit(edit.getAttribute('data-edit'));
            return;
        }
        const del = e.target && e.target.closest('[data-del]');
        if (del) {
            deleteMapping(del.getAttribute('data-del'));
        }
    });
    refreshBtn.addEventListener('click', loadMappings);
    applyFiltersBtn.addEventListener('click', loadMappings);
    clearFiltersBtn.addEventListener('click', function () {
        filterVendorEl.value = '';
        filterEnabledEl.value = '';
        loadMappings();
    });
    submitBtn.addEventListener('click', submitMapping);
    cancelEditBtn.addEventListener('click', resetFormToCreate);
    filterVendorEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') loadMappings();
    });
    filterVendorEl.addEventListener('input', function () {
        if (vendorFilterTimer) {
            clearTimeout(vendorFilterTimer);
        }
        vendorFilterTimer = setTimeout(function () {
            loadMappings();
        }, 300);
    });
    filterEnabledEl.addEventListener('change', loadMappings);
    window.addEventListener('popstate', function () {
        loadFiltersFromPageURL();
        loadMappings();
    });
    loadFiltersFromPageURL();
    resetFormToCreate();
    loadMappings();
})();
</script>
</body>
</html>
