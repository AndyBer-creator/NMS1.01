<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NMS1 — Traps</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
<div class="container mx-auto px-4 py-8 max-w-7xl">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6 mb-10">
        <div class="flex items-center gap-4">
            <a href="/" class="shrink-0 opacity-90 hover:opacity-100 transition-opacity">
                <img src="/static/logo.svg" alt="NMS1" class="h-16 w-auto drop-shadow-2xl">
            </a>
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-orange-400 to-amber-500 bg-clip-text text-transparent">
                    SNMP Traps
                </h1>
                <p class="text-gray-400 mt-1 text-sm">Последние события trap-receiver</p>
            </div>
        </div>
        <a href="/"
           class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl bg-gray-800 hover:bg-gray-700 border border-gray-600 text-sm font-medium transition-all hover:scale-[1.02] shadow-lg">
            ← На дашборд
        </a>
    </div>

    <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700/50 mb-8">
        <div class="flex flex-col md:flex-row md:items-end gap-4 mb-6">
            <div class="flex-1 min-w-[14rem]">
                <label for="trap-device" class="block text-sm text-gray-300 mb-2">Фильтр по устройству</label>
                <select id="trap-device"
                        class="w-full p-3 bg-gray-900/60 border border-gray-600 rounded-lg focus:border-orange-400 focus:outline-none text-gray-200">
                    <option value="">Все устройства</option>
                </select>
            </div>
            <div class="w-full md:w-40">
                <label for="trap-limit" class="block text-sm text-gray-300 mb-2">Лимит</label>
                <input id="trap-limit" type="number" min="1" max="1000" value="100"
                       class="w-full p-3 bg-gray-900/60 border border-gray-600 rounded-lg focus:border-orange-400 focus:outline-none">
            </div>
            <button id="trap-refresh"
                    class="px-5 py-3 rounded-lg bg-gradient-to-r from-orange-600 to-amber-600 hover:from-orange-500 hover:to-amber-500 font-semibold">
                Обновить
            </button>
        </div>

        <div id="trap-summary" class="text-sm text-gray-400 mb-4">Загрузка...</div>
        <div class="overflow-x-auto">
            <table class="w-full table-auto bg-gray-900/50 rounded-lg border border-gray-700/60">
                <thead>
                <tr class="bg-gray-700/50 border-b border-gray-600">
                    <th class="p-3 text-left text-gray-200">Время</th>
                    <th class="p-3 text-left text-gray-200">IP</th>
                    <th class="p-3 text-left text-gray-200">OID</th>
                    <th class="p-3 text-left text-gray-200">Uptime</th>
                    <th class="p-3 text-left text-gray-200">Vars</th>
                </tr>
                </thead>
                <tbody id="trap-table-body">
                <tr><td colspan="5" class="p-6 text-center text-gray-500">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script nonce="{{.CSPNonce}}">
    (function () {
        const deviceSel = document.getElementById('trap-device');
        const limitInput = document.getElementById('trap-limit');
        const refreshBtn = document.getElementById('trap-refresh');
        const body = document.getElementById('trap-table-body');
        const summary = document.getElementById('trap-summary');

        function esc(v) {
            return String(v ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function row(t) {
            const received = t.received_at ? new Date(t.received_at).toLocaleString() : '—';
            const varsText = typeof t.trap_vars === 'string'
                ? t.trap_vars
                : JSON.stringify(t.trap_vars ?? {});
            return `
                <tr class="border-b border-gray-700/70 hover:bg-gray-700/30">
                    <td class="p-3 text-sm text-gray-300">${esc(received)}</td>
                    <td class="p-3 font-mono text-sm text-cyan-300/90">${esc(t.device_ip || '')}</td>
                    <td class="p-3 font-mono text-xs text-amber-300/90 break-all">${esc(t.oid || '')}</td>
                    <td class="p-3 text-sm text-gray-300">${esc(t.uptime ?? '')}</td>
                    <td class="p-3 text-xs text-gray-400 break-all max-w-xl">${esc(varsText)}</td>
                </tr>`;
        }

        async function loadDeviceOptions() {
            const prev = deviceSel.value;
            try {
                const res = await fetch('/devices', { headers: { 'Accept': 'application/json' } });
                if (!res.ok) return;
                const devices = await res.json();
                deviceSel.innerHTML = '<option value="">Все устройства</option>';
                for (const d of devices || []) {
                    const opt = document.createElement('option');
                    opt.value = String(d.id);
                    opt.textContent = `${d.name || 'device'} (${d.ip})`;
                    deviceSel.appendChild(opt);
                }
                if (prev && [...deviceSel.options].some(o => o.value === prev)) {
                    deviceSel.value = prev;
                }
            } catch (e) { /* ignore */ }
        }

        async function loadTraps() {
            const devId = (deviceSel.value || '').trim();
            const limit = Math.max(1, Math.min(1000, parseInt(limitInput.value || '100', 10) || 100));
            const url = devId ? `/traps?device_id=${encodeURIComponent(devId)}&limit=${limit}` : `/traps?limit=${limit}`;
            refreshBtn.disabled = true;
            summary.textContent = 'Загрузка...';
            try {
                const res = await fetch(url, {headers: {'Accept': 'application/json'}});
                const text = await res.text();
                if (!res.ok) {
                    body.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-red-400">Ошибка ${res.status}: ${esc(text)}</td></tr>`;
                    summary.textContent = 'Ошибка загрузки traps';
                    return;
                }
                const traps = JSON.parse(text);
                if (!Array.isArray(traps) || traps.length === 0) {
                    body.innerHTML = '<tr><td colspan="5" class="p-6 text-center text-gray-500">Trap-ов пока нет</td></tr>';
                    summary.textContent = '0 traps';
                    return;
                }
                body.innerHTML = traps.map(row).join('');
                summary.textContent = `Показано ${traps.length} traps`;
            } catch (e) {
                body.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-red-400">Сеть: ${esc(e && e.message ? e.message : e)}</td></tr>`;
                summary.textContent = 'Ошибка сети';
            } finally {
                refreshBtn.disabled = false;
            }
        }

        const trapsTimer = setInterval(loadTraps, 15000);
        const deviceOptionsTimer = setInterval(loadDeviceOptions, 60000);
        let cleanedUp = false;
        function cleanup() {
            if (cleanedUp) return;
            cleanedUp = true;
            clearInterval(trapsTimer);
            clearInterval(deviceOptionsTimer);
        }
        window.addEventListener('pagehide', cleanup, { once: true });
        window.addEventListener('beforeunload', cleanup, { once: true });
        refreshBtn.addEventListener('click', loadTraps);
        loadDeviceOptions().then(loadTraps);
    })();
</script>
</body>
</html>
