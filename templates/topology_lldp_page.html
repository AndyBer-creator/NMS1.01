<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NMS1 — LLDP Topology</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/vis-network.min.js"></script>
    <style nonce="{{.CSPNonce}}">
        /* vis-network */
        #topology-canvas {
            height: 70vh;
            border-radius: 12px;
            background: #0f172a;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
<div class="container mx-auto px-4 py-8 max-w-6xl">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6 mb-10">
        <div class="flex items-center gap-4">
            <a href="/" class="opacity-90 hover:opacity-100 transition-opacity">
                <img src="/static/logo.svg" alt="NMS1" class="h-16 w-auto drop-shadow-2xl">
            </a>
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                    Топология LLDP
                </h1>
                <p class="text-gray-400 mt-1 text-sm">
                    Обновление раз в 5 минут · узлы: устройства из БД + найденные LLDP-соседи
                </p>
            </div>
        </div>

        <div class="flex gap-3">
            <a href="/devices/list" class="px-4 py-3 rounded-xl bg-gray-800 hover:bg-gray-700 border border-gray-600 text-sm font-medium transition-all">
                📋 Устройства
            </a>
            <a href="/traps" class="px-4 py-3 rounded-xl bg-orange-600/20 hover:bg-orange-600/30 border border-orange-500/40 text-sm font-medium transition-all">
                🔔 Traps
            </a>
        </div>
    </div>

    <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700/50 mb-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
            <h2 class="text-2xl font-semibold flex items-center">
                <span class="w-2 h-2 bg-blue-400 rounded-full mr-3 animate-pulse"></span>
                Граф LLDP
            </h2>
            <div class="text-sm text-gray-300">
                <span class="text-gray-400">scan_id:</span> <span id="lldp-scan-id" class="font-mono">—</span>
            </div>
        </div>

        <div id="topology-canvas"></div>

        <div class="mt-4 text-xs text-gray-400">
            Подпись ребра = <span class="text-gray-200">local_port → remote_port</span>. Если remote устройство не совпало с `devices.name`, оно будет показано как неизвестный сосед.
        </div>
    </div>

    <script nonce="{{.CSPNonce}}">
        (function () {
            const nodes = new vis.DataSet();
            const edges = new vis.DataSet();
            const container = document.getElementById('topology-canvas');

            const network = new vis.Network(container, { nodes, edges }, {
                autoResize: true,
                physics: { stabilization: { iterations: 150 }, enabled: true },
                interaction: { hover: true, tooltipDelay: 100 },
                nodes: { font: { size: 12 } },
                edges: {
                    font: { size: 10, align: 'middle' },
                    arrows: { to: { enabled: false } },
                    smooth: { type: 'dynamic' }
                }
            });

            function labelTrunc(s, maxLen) {
                const t = (s || '').toString();
                if (t.length <= maxLen) return t;
                return t.substring(0, maxLen - 1) + '…';
            }

            async function load() {
                try {
                    const res = await fetch('/topology/lldp/data', { headers: { 'Accept': 'application/json' } });
                    const j = await res.json();
                    document.getElementById('lldp-scan-id').textContent = j.scan_id != null ? j.scan_id : '—';

                    nodes.clear();
                    edges.clear();

                    for (const n of j.nodes || []) {
                        nodes.add({
                            id: n.id,
                            label: labelTrunc(n.label, 28),
                            color: n.color || undefined,
                            shape: n.shape || 'dot'
                        });
                    }
                    for (const e of j.edges || []) {
                        edges.add({
                            id: e.id,
                            from: e.from,
                            to: e.to,
                            label: labelTrunc(e.label, 30),
                            title: e.title || '',
                            color: e.color || undefined
                        });
                    }
                } catch (e) {
                    console.error('LLDP topology load failed', e);
                }
            }

            load();
            const refreshTimer = setInterval(load, 300000); // 5 minutes
            let cleanedUp = false;
            function cleanup() {
                if (cleanedUp) return;
                cleanedUp = true;
                clearInterval(refreshTimer);
            }
            window.addEventListener('pagehide', cleanup, { once: true });
            window.addEventListener('beforeunload', cleanup, { once: true });
        })();
    </script>
</div>
</body>
</html>
