# Для docker-compose.bridge.yml (api/worker в bridge-сети).
global:
  scrape_interval: 15s
rule_files:
  - /etc/prometheus/alerts/nms-alerts.yml
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'nms-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics
  - job_name: 'nms-worker'
    static_configs:
      - targets: ['worker:8081']
    metrics_path: /metrics
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
